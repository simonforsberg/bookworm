<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title} + ' – BookWorm'">Book – BookWorm</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap"
          rel="stylesheet">
    <link th:href="@{/css/bookworm.css}" rel="stylesheet">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>
    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
    </div>
</nav>

<main class="detail">
    <p class="breadcrumb">
        <a th:href="@{/books}">Library</a> / <span th:text="${book.title}">Title</span>
    </p>

    <h1 class="book-title" th:text="${book.title}">Book Title</h1>
    <p class="book-author" th:text="${book.author}">Author</p>

    <p class="book-description" th:text="${book.description}">Description</p>

    <div class="meta-grid">
        <div class="meta-item">
            <label>Publisher</label>
            <span th:text="${book.publisher}">Publisher</span>
        </div>
        <div class="meta-item">
            <label>Published</label>
            <span th:text="${#temporals.format(book.publicationDate, 'd MMM yyyy')}">Date</span>
        </div>
        <div class="meta-item">
            <label>Language</label>
            <span th:text="${book.language}">language</span>
        </div>
        <div class="meta-item">
            <label>Pages</label>
            <span class="mono" th:text="${book.pages}">000</span>
        </div>
        <div class="meta-item">
            <label>ISBN</label>
            <span class="mono" th:text="${book.isbn}">0000000000</span>
        </div>
    </div>

    <div class="actions">
        <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-yellow">Edit</a>
        <a th:href="@{/books}" class="btn btn-ghost">← Back</a>
        <span class="spacer"></span>
        <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post">
            <button type="submit" class="btn btn-danger-ghost"
                    onclick="return confirm('Delete this book?')">Delete
            </button>
        </form>
    </div>
</main>

<footer>BookWorm</footer>

</body>
</html>
