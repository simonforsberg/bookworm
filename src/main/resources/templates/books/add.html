<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorm – Add Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap"
          rel="stylesheet">
    <link th:href="@{/css/bookworm.css}" rel="stylesheet">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>
    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
    </div>
</nav>

<main class="add-edit-form">
    <p class="breadcrumb"><a th:href="@{/books}">Library</a> / Add book</p>
    <h1>Add book</h1>

    <form th:action="@{/books}" th:object="${book}" method="post">

        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" placeholder="Title"/>
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input id="author" type="text" th:field="*{author}" placeholder="Author"/>
            <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="field-error"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="publisher">Publisher</label>
                <input id="publisher" type="text" th:field="*{publisher}" placeholder="Publisher"/>
                <span th:if="${#fields.hasErrors('publisher')}" th:errors="*{publisher}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="publicationDate">Publication date</label>
                <input id="publicationDate" type="date" th:field="*{publicationDate}"/>
                <span th:if="${#fields.hasErrors('publicationDate')}" th:errors="*{publicationDate}"
                      class="field-error"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input id="isbn" type="text" th:field="*{isbn}" placeholder="10 or 13 digits"/>
            <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="field-error"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="language">Language</label>
                <input id="language" type="text" th:field="*{language}" placeholder="Language"/>
                <span th:if="${#fields.hasErrors('language')}" th:errors="*{language}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="pages">Pages</label>
                <input id="pages" type="text" th:field="*{pages}" placeholder="Number of pages"/>
                <span th:if="${#fields.hasErrors('pages')}" th:errors="*{pages}" class="field-error"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="4" placeholder="A short summary..."></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-yellow">Save book</button>
            <a th:href="@{/books}" class="btn btn-ghost">Cancel</a>
        </div>

    </form>
</main>

<footer>BookWorm</footer>

</body>
</html>
