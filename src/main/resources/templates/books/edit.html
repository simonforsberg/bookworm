<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorm – Edit Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --text: #111111;
            --muted: #888888;
            --yellow: #f5c518;
            --yellow-hover: #e0b300;
            --danger: #cc3333;
            --radius: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand { font-weight: 500; font-size: 1rem; color: var(--text); text-decoration: none; }
        .nav-brand span { color: var(--yellow-hover); }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
        .nav-links a:hover { color: var(--text); }

        main { max-width: 600px; margin: 0 auto; padding: 3rem 2rem; }

        .breadcrumb { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.8rem; }
        .breadcrumb a { color: var(--muted); text-decoration: none; }
        .breadcrumb a:hover { color: var(--text); }

        h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.35rem;
            letter-spacing: 0.02em;
        }

        input, textarea {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Geist', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus { border-color: #aaa; }
        textarea { resize: vertical; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .field-error {
            display: block;
            color: var(--danger);
            font-size: 0.78rem;
            margin-top: 0.25rem;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-top: 1.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            border-radius: var(--radius);
            font-family: 'Geist', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .btn-yellow { background: var(--yellow); color: var(--text); border-color: var(--yellow); }
        .btn-yellow:hover { background: var(--yellow-hover); border-color: var(--yellow-hover); }
        .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: #bbb; }

        footer { border-top: 1px solid var(--border); margin-top: 4rem; padding: 1.5rem 2rem; text-align: center; color: var(--muted); font-size: 0.78rem; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>
    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
        <a th:href="@{/books/search}">Search</a>
    </div>
</nav>

<main>
    <p class="breadcrumb">
        <a th:href="@{/books}">Library</a> /
        <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}">Book</a> /
        Edit
    </p>
    <h1>Edit book</h1>

    <form th:action="@{/books/{id}/edit(id=${book.id})}" th:object="${book}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}"/>
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input id="author" type="text" th:field="*{author}"/>
            <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="field-error"></span>
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="publisher">Publisher</label>
                <input id="publisher" type="text" th:field="*{publisher}"/>
                <span th:if="${#fields.hasErrors('publisher')}" th:errors="*{publisher}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="publicationDate">Publication date</label>
                <input id="publicationDate" type="date" th:field="*{publicationDate}"/>
                <span th:if="${#fields.hasErrors('publicationDate')}" th:errors="*{publicationDate}" class="field-error"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input id="isbn" type="text" th:field="*{isbn}"/>
            <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="field-error"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="language">Language</label>
                <input id="language" type="text" th:field="*{language}"/>
                <span th:if="${#fields.hasErrors('language')}" th:errors="*{language}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="pages">Pages</label>
                <input id="pages" type="text" th:field="*{pages}"/>
                <span th:if="${#fields.hasErrors('pages')}" th:errors="*{pages}" class="field-error"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="4"></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-yellow">Save changes</button>
            <a th:href="@{/books}" class="btn btn-ghost">Cancel</a>
        </div>

    </form>
</main>

<footer>BookWorm</footer>

</body>
</html>
