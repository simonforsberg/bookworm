<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorm – Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap"
          rel="stylesheet">
    <link th:href="@{/css/bookworm.css}" rel="stylesheet">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>

    <form th:action="@{/books}" method="get">
        <div class="search-bar">
            <input type="text" name="title" th:value="${title}" placeholder="Search by title">
            <input type="text" name="author" th:value="${author}" placeholder="Search by author">
            <button type="submit" class="btn btn-ghost">Search</button>
            <a th:href="@{/books}" class="btn btn-ghost" th:if="${title != null or author != null}">Clear</a>
        </div>
    </form>

    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Library</h1>
        <a th:href="@{/books/add}" class="btn btn-yellow">+ Add book</a>
    </div>

    <div th:if="${books.isEmpty()} and ${isSearch}" class="empty">
        <p>No books found matching your search.</p>
        <a th:href="@{/books}" class="btn btn-ghost">Back to library</a>
    </div>

    <div th:if="${books.isEmpty()} and !${isSearch}" class="empty">
        <p>No books yet.</p>
        <a th:href="@{/books/add}" class="btn btn-yellow">Add your first book</a>
    </div>

    <table th:unless="${books.isEmpty()}">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Publisher</th>
            <th>Published</th>
            <th>ISBN</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td class="cell-title">
                <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}">Title</a>
            </td>
            <td class="cell-muted" th:text="${book.author}">Author</td>
            <td class="cell-muted" th:text="${book.publisher}">Publisher</td>
            <td class="cell-muted" th:text="${#temporals.format(book.publicationDate, 'yyyy-MM-dd')}">Date</td>
            <td class="cell-mono" th:text="${book.isbn}">ISBN</td>
            <td class="cell-actions">
                <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-ghost">Edit</a>
                <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post">
                    <button type="submit" class="btn btn-danger-ghost"
                            onclick="return confirm('Delete this book?')">Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 1}" style="margin-top: 1rem; display:flex; gap:0.5rem;">

        <!-- Previous -->
        <a th:if="${page.hasPrevious()}"
           th:href="@{/books(page=${page.number - 1}, title=${title}, author=${author})}"
           class="btn btn-ghost">
            Previous
        </a>

        <!-- Current page -->
        <span class="btn btn-ghost">
        Page <span th:text="${page.number + 1}"></span>
        /
        <span th:text="${page.totalPages}"></span>
    </span>

        <!-- Next -->
        <a th:if="${page.hasNext()}"
           th:href="@{/books(page=${page.number + 1}, title=${title}, author=${author})}"
           class="btn btn-ghost">
            Next
        </a>

    </div>

</main>

<footer>BookWorm</footer>

</body>
</html>
