<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorm – Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --text: #111111;
            --muted: #888888;
            --yellow: #f5c518;
            --yellow-hover: #e0b300;
            --danger: #cc3333;
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-weight: 500;
            font-size: 1rem;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .nav-brand span {
            color: var(--yellow-hover);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 0.45rem 1rem;
            border-radius: var(--radius);
            font-family: 'Geist', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-yellow {
            background: var(--yellow);
            color: var(--text);
            border-color: var(--yellow);
        }

        .btn-yellow:hover {
            background: var(--yellow-hover);
            border-color: var(--yellow-hover);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: #bbb;
        }

        .btn-danger-ghost {
            background: transparent;
            color: var(--danger);
            border-color: transparent;
            font-size: 0.8rem;
            padding: 0.4rem 0.7rem;
        }

        .btn-danger-ghost:hover {
            background: #fff0f0;
            border-color: #f5c5c5;
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: 5rem 0;
            color: var(--muted);
        }

        .empty p {
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }

        /* SEARCH BAR */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .search-bar input {
            width: 220px;
            padding: 0.45rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Geist', sans-serif;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s;
        }

        .search-bar input:focus {
            border-color: #aaa;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        thead th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
        }

        .cell-title a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        .cell-title a:hover {
            text-decoration: underline;
        }

        .cell-muted {
            color: var(--muted);
        }

        .cell-mono {
            font-family: 'Geist Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .cell-actions {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            justify-content: flex-end;
        }

        footer {
            border-top: 1px solid var(--border);
            margin-top: 4rem;
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.78rem;
        }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>

    <form th:action="@{/books}" method="get">
        <div class="search-bar">
            <input type="text" name="title" th:value="${title}" placeholder="Search by title">
            <input type="text" name="author" th:value="${author}" placeholder="Search by author">
            <button type="submit" class="btn btn-ghost">Search</button>
            <a th:href="@{/books}" class="btn btn-ghost" th:if="${title != null or author != null}">Clear</a>
        </div>
    </form>

    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Library</h1>
        <a th:href="@{/books/add}" class="btn btn-yellow">+ Add book</a>
    </div>

    <div th:if="${books.isEmpty()}" class="empty">
        <p>No books yet.</p>
        <a th:href="@{/books/add}" class="btn btn-yellow">Add your first book</a>
    </div>

    <table th:unless="${books.isEmpty()}">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Publisher</th>
            <th>Published</th>
            <th>ISBN</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td class="cell-title">
                <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}">Title</a>
            </td>
            <td class="cell-muted" th:text="${book.author}">Author</td>
            <td class="cell-muted" th:text="${book.publisher}">Publisher</td>
            <td class="cell-muted" th:text="${#temporals.format(book.publicationDate, 'yyyy-MM-dd')}">Date</td>
            <td class="cell-mono" th:text="${book.isbn}">ISBN</td>
            <td class="cell-actions">
                <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-ghost">Edit</a>
                <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post">
                    <button type="submit" class="btn btn-danger-ghost"
                            onclick="return confirm('Delete this book?')">Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<footer>BookWorm</footer>

</body>
</html>
