<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Resource not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap"
          rel="stylesheet">
    <link th:href="@{/css/bookworm.css}" rel="stylesheet">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/books}">Book<span>Worm</span></a>
    <div class="nav-links">
        <a th:href="@{/books}">Library</a>
        <a th:href="@{/books/add}">Add book</a>
    </div>
</nav>

<main>
    <div class="notfound">

        <h1>404 – Resource not found</h1>
        <p th:text="${message}">The page or resource you're looking for doesn't exist.</p>
        <a th:href="@{/books}" class="btn btn-yellow">Back to the library</a>
    </div>
</main>

<footer>BookWorm</footer>

</body>
</html>
